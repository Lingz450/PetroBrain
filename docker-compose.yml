# LOCAL DEV ONLY. Do not run on a public host:
#   * Postgres / Redis / MinIO are bound to host ports with default creds.
#   * .env loads dev secrets directly into containers.
# For production use docker-compose-prod.yml (Tier B) or the AWS Terraform stack
# in infra/envs/prod.
services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db, redis, minio]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  worker:
    build: .
    env_file: .env
    depends_on: [db, redis, minio]
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q petrobrain.ingest
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: petrobrain
      POSTGRES_PASSWORD: petrobrain
      POSTGRES_DB: petrobrain
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
volumes:
  pgdata:
  miniodata:
